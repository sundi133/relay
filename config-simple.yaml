# Simple Relay config without guardrails
#
# This is the minimal configuration for Relay LLM proxy
# No guardrails, no complex setup - just works!

model_list:
  # ── OpenAI Models ─────────────────────────────────────────────────────────
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # ── Anthropic Models ──────────────────────────────────────────────────────
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY

  # ── Local Models ──────────────────────────────────────────────────────────
  - model_name: llama3
    litellm_params:
      model: ollama/llama3.2

# ── Basic Settings ────────────────────────────────────────────────────────
general_settings:
  master_key: sk-relay-simple-key  # optional auth
  request_timeout: 120